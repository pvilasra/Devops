name: Java CI/CD to GKE

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: infra-triumph-360214
  PROJECT_NUMBER: 707328741715
  REGION: us-central1
  CLUSTER_NAME: demo-gke-cluster
  CLUSTER_ZONE: us-central1-a
  REPO_NAME: java-repo
  IMAGE_NAME: java-app

jobs:
  ci-cd:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:

    # ✅ Checkout code
    - name: Checkout
      uses: actions/checkout@v4

    # ✅ Setup Java
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # ✅ Build + Test
    - name: Build and Test
      run: |
        ./mvnw clean verify || mvn clean verify

    # ✅ Code Scanning (basic with dependency check)
    - name: Dependency Scan
      run: |
        mvn org.owasp:dependency-check-maven:check

    # ✅ Authenticate to GCP (OIDC)
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: projects/${{ env.PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
        service_account: github-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

    # ✅ Setup gcloud
    - name: Setup gcloud
      uses: google-github-actions/setup-gcloud@v2

    # ✅ Configure Docker for Artifact Registry
    - name: Configure Docker
      run: |
        gcloud auth configure-docker ${REGION}-docker.pkg.dev

    # ✅ Build Docker image
    - name: Build Docker Image
      run: |
        docker build -t ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/${IMAGE_NAME}:${{ github.sha }} .

    # ✅ Push image to Artifact Registry
    - name: Push Docker Image
      run: |
        docker push ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/${IMAGE_NAME}:${{ github.sha }}

    # ✅ Install kubectl
    - name: Install kubectl
      uses: azure/setup-kubectl@v4

    # ✅ Get GKE credentials
    - name: Get GKE Credentials
      run: |
        gcloud container clusters get-credentials ${CLUSTER_NAME} \
          --zone ${CLUSTER_ZONE} \
          --project ${PROJECT_ID}

    # ✅ Deploy to GKE
    - name: Deploy to GKE
      run: |
        kubectl set image deployment/java-app java-app=${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/${IMAGE_NAME}:${{ github.sha }} || \
        kubectl create deployment java-app \
          --image=${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/${IMAGE_NAME}:${{ github.sha }}

        kubectl expose deployment java-app --type=LoadBalancer --port 80 || true

    # ✅ Verify deployment
    - name: Verify Deployment
      run: |
        kubectl get pods
        kubectl get svc